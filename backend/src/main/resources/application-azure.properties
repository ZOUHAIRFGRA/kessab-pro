spring.application.name=kessab_pro

# Database configuration - Azure MySQL (using environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.validator.fail_fast=true
spring.jpa.show-sql=false

# JWT Secret
jwt.secret=${JWT_SECRET}

# Admin credentials
spring.security.user.name=${ADMIN_USERNAME}
spring.security.user.password=${ADMIN_PASSWORD}

# Logging levels
logging.level.org.springframework=INFO
logging.level.uit.ac.ma.est.kessabpro=INFO

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Static resource locations
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Server port - Azure sets this automatically
# server.port=${PORT:8080}

# Enable graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

name: Deploy Spring Boot App to Azure App Service

on:
  push:
    branches:
      - main
      - azure
env:
  AZURE_WEBAPP_NAME: 'kessabpro-app' # Replace with your App Service name
  JAVA_VERSION: '21' # Replace with your Java version (e.g., '11', '17')
  ARTIFACT_PATH: 'target/kessabPro-0.0.1-SNAPSHOT.jar' # Adjust if your artifact name/path is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'microsoft' # Or 'temurin', 'adopt', etc.
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'production' # Or a staging slot if you set one up
          package: ${{ env.ARTIFACT_PATH }}
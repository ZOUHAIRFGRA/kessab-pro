name: Deploy Backend to Azure

on:
  push:
    branches: [ main, test-deploy ]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-deploy-updated.yml'
  workflow_dispatch: # Allow manual triggering of the workflow
    
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      
      - name: Fix Maven wrapper
        run: |
          cd backend
          # Ensure proper line endings
          git config --global core.autocrlf input
          # Make the Maven wrapper executable
          chmod +x ./mvnw
          # Show file permissions
          ls -la
          
      - name: Build with Maven
        run: |
          cd backend
          ./mvnw clean package -DskipTests
          
      - name: Verify JAR file
        run: |
          cd backend/target
          # List all JAR files produced
          ls -la *.jar
          echo "JAR file is ready for deployment"
        
      - name: Setup Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'kessabpro'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: 'backend/target/kessabPro-0.0.1-SNAPSHOT.jar'

      - name: Configure App Settings
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group kessabpro_group \
              --name kessabpro \
              --settings \
                SPRING_PROFILES_ACTIVE=azure \
                SPRING_DATASOURCE_URL="jdbc:mysql://kessab-pro-mysql.mysql.database.azure.com:3306/kessab?useSSL=true&requireSSL=false&createDatabaseIfNotExist=true" \
                SPRING_DATASOURCE_USERNAME="mysqlrootuser@kessab-pro-mysql" \
                SPRING_DATASOURCE_PASSWORD="${{ secrets.DATASOURCE_PASSWORD }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
                ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
      
      - name: Run Azure CLI script (Post-deployment steps)
        run: |
          az webapp restart --name kessabpro --resource-group kessabpro_group
